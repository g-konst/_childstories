---
layout: default
permalink: /
title: App
text-align: center
---

  <div class="row align-items-center">
    <div class="col col-12 col-md-6 text-{{ page.text-align }}">
        <img class="d-block mx-auto mb-2" src="./assets/text.png" alt="" width="128">
        <h3>{{ site.title }}</h3>
        <p class="lead py-5">{{ site.description }}.</p>
            {% if site.google_play_id %}
            <a href='http://play.google.com/store/{{ site.google_play_id }}?pcampaignid=pcampaignidMKT-Other-global-all-co-prtnr-py-PartBadge-Mar2515-1'>
              <img alt='Доступно в Google Play' src='https://play.google.com/intl/en_us/badges/static/images/badges/ru_badge_web_generic.png' width="240"/></a>
            {% endif %}
    </div>

    <div class="col col-12 col-md-6 mx-auto py-5">
      <img src="./assets/app_view.png" alt="" width="480">
    </div>

  </div>
